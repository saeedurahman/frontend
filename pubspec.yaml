name: frantend
description: Multi-tenant SaaS POS desktop application with offline sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.0.0

  # DI
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Network
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Local DB (Offline)
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.2
  path: ^1.8.3

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # PDF & Printing
  pdf: ^3.10.7
  printing: ^5.12.0

  # Barcode
  mobile_scanner: ^3.5.6

  # Thermal Printer (Android Bluetooth — desktop uses printing package)
  bluetooth_thermal_printer: ^0.0.6

  # Charts
  fl_chart: ^0.66.2

  # Images
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.20.2
  decimal: ^2.3.3
  collection: ^1.18.0
  dartz: ^0.10.1

  # UI
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  intl_phone_field: ^3.2.0
  dlibphonenumber: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  drift_dev: ^2.14.1
  injectable_generator: ^2.4.1
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/app_logos/
